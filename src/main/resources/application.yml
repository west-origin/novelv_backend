spring:
  application:
    name: novelv

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/postgres}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

app:
  ffmpeg:
    path: ${FFMPEG_PATH:ffmpeg}
    timeout-seconds: ${FFMPEG_TIMEOUT_SECONDS:30}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}
  jwt:
    secret: ${JWT_SECRET:change-this-secret-key-to-at-least-32-bytes-long}
    access-token-validity-ms: ${JWT_ACCESS_TOKEN_VALIDITY_MS:3600000}
  cloudflare:
    r2:
      account-id: ${CLOUDFLARE_ACCOUNT_ID:e53ddd024fcaf45c398aa5f81262a740}
      access-key-id: ${CLOUDFLARE_R2_ACCESS_KEY_ID:a36aa3a6d69a24272bef4094cd392483}
      secret-access-key: ${CLOUDFLARE_R2_SECRET_ACCESS_KEY:f8b2c981d13e4be88b14e65c479d4c9ab80257535fa1422387a892c8077231b0}
      bucket-name: ${CLOUDFLARE_R2_BUCKET_NAME:novelv}
      endpoint: ${CLOUDFLARE_R2_ENDPOINT:https://e53ddd024fcaf45c398aa5f81262a740.r2.cloudflarestorage.com}
      upload-url-ttl-seconds: ${CLOUDFLARE_R2_UPLOAD_URL_TTL_SECONDS:900}
      playback-url-ttl-seconds: ${CLOUDFLARE_R2_PLAYBACK_URL_TTL_SECONDS:300}
  oauth2:
    authorized-redirect-uri: ${OAUTH2_AUTHORIZED_REDIRECT_URI:http://localhost:5173/oauth/callback}
    google:
      client-id: ${GOOGLE_CLIENT_ID:}
      client-secret: ${GOOGLE_CLIENT_SECRET:}
      token-uri: https://oauth2.googleapis.com/token
      user-info-uri: https://www.googleapis.com/oauth2/v3/userinfo
    kakao:
      client-id: ${KAKAO_CLIENT_ID:b7cadd4838972b041a45755e6ced95c7}
      client-secret: ${KAKAO_CLIENT_SECRET:wJeE8t7msiptFq6jajRd3tZsenVeZbD4}
      token-uri: https://kauth.kakao.com/oauth/token
      user-info-uri: https://kapi.kakao.com/v2/user/me
    naver:
      client-id: ${NAVER_CLIENT_ID:}
      client-secret: ${NAVER_CLIENT_SECRET:}
      token-uri: https://nid.naver.com/oauth2.0/token
      user-info-uri: https://openapi.naver.com/v1/nid/me
